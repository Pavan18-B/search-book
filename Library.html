<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Library Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📚 College Library Management System</h1>
  </header>

  <!-- Categories -->
  <section class="categories-section">
    <h2>Select Category</h2>
    <div class="categories">
      <button onclick="showCategory('ECE')">⚡ ECE</button>
      <button onclick="showCategory('EEE')">🔌 EEE</button>
      <button onclick="showCategory('CSE')">💻 CSE</button>
      <button onclick="showCategory('Civil')">🏗 Civil</button>
    </div>
  </section>

  <!-- Search Bar -->
  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search book by title or author">
    <button onclick="searchBook()">🔍 Search</button>
  </section>

  <!-- Results -->
  <section class="results-section">
    <h2>Books</h2>
    <div id="results"></div>
  </section>

  <footer>
    <p>© 2026 College Library | Designed by Pavan</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
